<mat-sidenav-container class="example-container" *ngIf="true" [hasBackdrop]="false">

  <!-- OVERVIEW SLIDE -->
  <mat-sidenav mode="over" [opened]="overview" style="width: 350px;">
    <mat-card (click)="goToSlide(i)" class="example-card" *ngFor="let item of appSearchSlidesData; let i = index">
      <img [src]="'http://www.bipresents.com/' + item.SlideBGFileName" alt="overview"
        style="max-width: 300px;cursor: pointer;">
    </mat-card>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="container">



      <!-- PRESENTATION -->
      <div *ngIf="!createPostIt" fxLayoutAlign="center center" class="col">
        <div class="slide-box" [style]="slideBackground">

          <mat-toolbar class="toolbar mat-elevation-z4" *ngIf="mainMenu">

            <button (click)="home()" mat-icon-button aria-label="Example icon-button with a heart icon">
              <mat-icon>home</mat-icon>
            </button>

            <button (click)="bsr()" mat-icon-button color="primary" aria-label="Example icon-button with a heart icon">
              <mat-icon>lightbulb_outline</mat-icon>
            </button>

            <input class="search" placeholder="search" type="text" (keypress)="searchTerm($event.target.value)">
            <div class="col" *ngIf="isSearching">
              <div style="
              width: 149px;
              height: 580px;
              overflow-y: scroll;
              position: relative;
              left: -186px;
              bottom: 310px;">
                <mat-card (click)="goToSlide(i)" class="example-card" *ngFor="let item of appSlidesData; let i = index">
                  <img [src]="'http://www.bipresents.com/' + item.SlideBGFileName" alt="overview"
                    style="max-width: 100px;cursor: pointer;">
                </mat-card>
              </div>
            </div>
            <button (click)="moveBackward()" mat-icon-button color="primary"
              aria-label="Example icon-button with a heart icon">
              <mat-icon>chevron_left</mat-icon>
            </button>

            <button (click)="moveForward()" mat-icon-button color="primary"
              aria-label="Example icon-button with a heart icon">
              <mat-icon>chevron_right</mat-icon>
            </button>

            <button (click)="comment()" mat-icon-button aria-label="Example icon-button with a heart icon">
              <mat-icon>comment</mat-icon>
            </button>

            <button (click)="openDialog('mobileInfo', 'do')" mat-icon-button color="primary"
              aria-label="Example icon-button with a heart icon">
              <mat-icon>phone_iphone</mat-icon>
            </button>


            <button (click)="sideMenu()" mat-icon-button color="accent"
              aria-label="Example icon-button with a heart icon">
              <mat-icon>import_contacts</mat-icon>
            </button>

            <button mat-icon-button aria-label="Proprietary" style="width: 200px;">
              Proprietary & Confidential
            </button>

            <button (click)="bsr()" mat-icon-button aria-label="page" style="width: 100px;font-size: 23px;">
              {{pageCounter}}
            </button>

            <button (click)="displayHelp(false)" mat-icon-button color="warn"
              aria-label="Example icon-button with a heart icon">
              <mat-icon style="color: green !important;">help</mat-icon>
            </button>

          </mat-toolbar>
        </div>
      </div>
      <div class="row">
      </div>
      <!-- POST-ITS -->
      <div *ngIf="createPostIt">

        <div class="container" fxLayoutAlign="center center">


          <div class="col">
            <div fxLayoutAlign="start start" style="position: relative;
          top: 100px;
          width: 955px;
          height: 718px;
          background-color: blueviolet;
          place-content: center;
          align-items: center;
          flex-direction: row;
          box-sizing: border-box;
          display: flex;">
              <mat-toolbar class="toptoolbar mat-elevation-z4" color="primary">
                <div class="row">
                  <div class="col" style="color: white; font-size: 40px;font-family: Arial">
                    Brandstorm
                  </div>
                  <div class="col" (click)="toggleNamebox()"
                    style="color: white; font-size: 40px;font-family: Arial; right: -370px;cursor: pointer;"
                    [matTooltip]="'Names Create '+ nameCandidates.length" matTooltipPosition="right">
                    Names
                  </div>
                </div>
              </mat-toolbar>
              <div class="row" cdkDropList
              [cdkDropListData]="conceptData.concepts" (cdkDropListDropped)="drop($event)" fxLayoutAlign="start start" style="top: 57px;
              position: relative;
              width: 955px;
              left: 16px;
              height: 718px;
              background-color: blueviolet;
              place-content: flex-start;
              align-items: flex-start;
              flex-direction: row;
              box-sizing: border-box;
              display: flex;overflow-y: scroll;
    overflow-x: hidden;">
                <mat-card class="mat-elevation-z4  bi-blue biCard shrinkCard" cdkDrag cdkDragLockAxis="xy"
                  *ngFor="let item of conceptData.concepts; let i = index;">

                  <!-- TITLE -->

                  <div style="   
                height: 60px;
                overflow-x: hidden;
                width: 283px;
                border-radius: 15px;">
                    <div class="mat-h2 shrink-card-content biCard">{{item.concept}}</div>
                  </div>


                  <!-- HTML-CONTENT -->

                  <mat-card-content class="shrink-card-color biCard"
                    style="width: 283px;height: 160px; overflow-y: scroll; overflow-x: hidden;">
                    <div [innerHTML]="item.html">{{item.html}}</div>
                  </mat-card-content>

                  <mat-card-actions fxLayoutAlign="end end">
                    <button (click)="openDialog(item, 'edit')" mat-mini-fab class="post-button" color="primary">
                      <mat-icon style="font-size: 18px;">create</mat-icon>
                    </button>
                    <button (click)="openDialog(item, 'delete')" mat-mini-fab class="post-button" color="primary">
                      <mat-icon style="font-size: 20px;">cancel</mat-icon>
                    </button>
                  </mat-card-actions>

                </mat-card>

              </div>

            </div>


          </div>

          <!-- Brandstomr and Names toolbar -->





        </div>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>


<hotkeys-cheatsheet title="Hotkeys Menu"></hotkeys-cheatsheet>
